name: GrabFreeProxy Hourly Update

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: grabfreeproxy-${{ github.ref }}
  cancel-in-progress: true
  
jobs:
  update-proxies:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      # ----------------------------------------
      # Checkout with robust retry protection
      # ----------------------------------------
      - name: Checkout Repository (more stable)
        uses: actions/checkout@v4
        with:
           fetch-depth: 1
           persist-credentials: false
           clean: true

      # ----------------------------------------
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 aiohttp lxml

      - name: Run GrabFreeProxy Script
        run: python gfp.py

      # ----------------------------------------
      # Gist Update
      # ----------------------------------------
      - name: Update Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python - << 'EOF'
          import requests, json, os

          gist_id = os.getenv("GIST_ID")
          token = os.getenv("GIST_TOKEN")

          with open('gfp_proxy.json') as f:
             content = json.load(f)

          requests.patch(
             f'https://api.github.com/gists/{gist_id}',
             headers={'Authorization': f'token {token}'},
             json={'files': {'proxy.json': {'content': json.dumps(content, indent=2)}}}
          )
          EOF
